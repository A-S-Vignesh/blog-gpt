name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          # Turbopack can exhaust the default Node heap on large App Router
          # builds; raise it so CI builds are deterministic.
          NODE_OPTIONS: --max-old-space-size=4096
          # Build-time placeholders so the build does not fail on missing env.
          # Real secrets are injected by the deploy platform (e.g. Vercel).
          MONGODB_URI: mongodb://localhost:27017/ci
          NEXTAUTH_SECRET: ci-placeholder-secret
          NEXTAUTH_URL: http://localhost:3000
          GOOGLE_CLIENT_ID: ci
          GOOGLE_CLIENT_SECRET: ci
          GOOGLE_GENETATIVE_AI: ci
          CLOUDINARY_CLOUD_NAME: ci
          CLOUDINARY_API_KEY: ci
          CLOUDINARY_API_SECRET: ci
